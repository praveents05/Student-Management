<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Student Management System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>Student List</h3>
        <a href="/add" class="btn btn-primary">Add Student</a>
    </div>

    <!-- Search -->
    <form method="get" th:action="@{/students}" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Search by name"
                   th:value="${keyword}">
            <button class="btn btn-outline-secondary">Search</button>
        </div>
    </form>

    <!-- Table -->
    <table class="table table-bordered table-hover shadow">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Gender</th>
            <th>Marks</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="student, iter : ${students}">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.department}"></td>
            <td th:text="${student.gender}"></td>
            <td>
                <span class="badge bg-success"
                      th:text="${student.marks}"></span>
            </td>
            <td>
                <a th:href="@{/students/edit/{id}(id=${student.id})}" 
                class="btn btn-warning btn-sm">Edit</a>

               <a th:href="@{/students/delete/{id}(id=${student.id})}"
                class="btn btn-danger btn-sm">
                Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
