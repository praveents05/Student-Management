<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4 border-0">

        <h3 class="text-center text-primary mb-4">✏ Edit Student Details</h3>

        <form th:action="@{/students/save}" th:object="${student}" method="post">

            <!-- Hidden ID (VERY IMPORTANT for update) -->
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label fw-bold">Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Department</label>
                <input type="text" th:field="*{department}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Gender</label>
                <select th:field="*{gender}" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Marks</label>
                <input type="number" th:field="*{marks}" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/students" class="btn btn-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-success">Update Student</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
