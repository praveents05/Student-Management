<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3>Add Student</h3>

        <form th:action="@{/students/save}" th:object="${student}" method="post">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text" th:field="*{department}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <input type="text" th:field="*{gender}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Marks</label>
                <input type="number" th:field="*{marks}" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Save</button>
            <a href="/students" class="btn btn-secondary">Back</a>

        </form>
    </div>
</div>

</body>
</html>
